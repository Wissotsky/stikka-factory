# Sticker Factory Configuration
# This file contains application settings (non-sensitive)
# API keys should be in .streamlit/secrets.toml

[app]
title = "✨ Stikka Centraal ✨"
privacy_mode = true
debug_mode = false

[ui]
history_limit = 15
items_per_page = 5

[logging]
file = false
file_level = "WARNING"
stdout = true
stdout_level = "DEBUG"

[tabs]
# Enable or disable tabs by setting them to true or false
# Order in this list determines tab order in the app
enabled = [
    "Sticker",
    "Sticker Pro",
    "Tiling",
    "Label",
    "Webcam",
    "?Openverse:Cat",
    "?Openverse:Dog",
    "History",
    "Stats",
    "FAQ",
    "Openverse",
]

[fallback]
models = [
    "QL-570"
]
label = 62
